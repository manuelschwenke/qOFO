  minute: 480
  new_setpoint: .nan
  p_mw: 300
  q_mvar: 150
  time_s: null
- action: trip
  bus: 27
  element_index: -1
  element_type: load
  minute: 560
  new_setpoint: .nan
  p_mw: 300
  q_mvar: 150
  time_s: null

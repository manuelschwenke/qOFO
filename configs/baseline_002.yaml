# Adaptive g_w (paper Eq. 16, Zagorowska et al. IFAC WC 2026).  All
# flags off here keeps the static-g_w baseline behaviour unchanged.
# Switch a flag to true to activate online sign-rule adaptation for
# the matching actuator class; the corresponding `g_w_*` value below
# becomes the warm-start initial value.  Meta knobs `g_w_adapt_*`
# control the multiplicative rate and clip box.
adapt_g_w_der: false
adapt_g_w_dso_der: false
adapt_g_w_dso_oltc: false
adapt_g_w_gen: false
adapt_g_w_pcc: false
adapt_g_w_tso_oltc: false
contingencies:
- action: trip
  bus: null
  element_index: 5
  element_type: gen
  minute: 90
  new_setpoint: .nan
  p_mw: .nan
  q_mvar: .nan
  time_s: null
- action: restore
  bus: null
  element_index: 5
  element_type: gen
  minute: 180
  new_setpoint: .nan
  p_mw: .nan
  q_mvar: .nan
  time_s: null
- action: connect
  bus: 5
  element_index: -1
  element_type: load
  minute: 120
  new_setpoint: .nan
  p_mw: 300
  q_mvar: 100
  time_s: null
- action: trip
  bus: 5
  element_index: -1
  element_type: load
  minute: 300
  new_setpoint: .nan
  p_mw: 300
  q_mvar: 100
  time_s: null
- action: connect
